<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اقتباسات يومي - تطبيق الاقتباسات العربية</title>
    <!-- ربط ملف CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- خطوط Google وأيقونات Font Awesome (تبقى في HTML لأنها روابط خارجية) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-quote-right" style="color: #3498db;"></i> اقتباسات يومي</h1>
        <div class="subtitle">حكم وأقوال تلهم يومك</div>

        <div class="quote-box">
            <i class="fas fa-quote-right quote-icon"></i>
            <div class="quote-text" id="quote">اضغط على الزر للحصول على اقتباس</div>
            <div class="quote-author" id="author"></div>
            <i class="fas fa-quote-right quote-icon left"></i>
        </div>

        <button class="new-quote-btn" onclick="showNewQuote()">
            <i class="fas fa-sync-alt"></i> اقتباس جديد
        </button>

        <div class="counter" id="counter"></div>

        <div class="footer">
            <i class="fas fa-heart" style="color: #e74c3c;"></i> اقتباسات عربية ملهمة
        </div>
    </div>

    <!-- ربط ملف JavaScript (يُفضل وضعه في نهاية الجسم قبل إغلاق body) -->
    <script src="script.js"></script>
</body>
</html>
